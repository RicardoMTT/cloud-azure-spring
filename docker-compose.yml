services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Admin1234!"
    ports:
      - "1433:1433"
    volumes:
      - sqldata:/var/lib/mssql/data
    healthcheck:
      test: [ "CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "Admin1234!", "-Q", "SELECT 1", "-No" ]
      interval: 10s
      timeout: 5s
      retries: 5
  api:
    build: .
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      # Aca el nombre del servicio es sqlserver porque es el nombre que le dimos al servicio en lugar de host.docker.internal porque dentro de la red de docker los contenedores se comunican por el nombre del servicio
      DB_URL: "jdbc:sqlserver://localhost:1433;database=usuariodb;encrypt=false;trustServerCertificate=true"
      DB_USERNAME: sa
      DB_PASSWORD: "Admin1234!"
    depends_on:
      sqlserver:
        condition: service_healthy
volumes:
  sqldata: